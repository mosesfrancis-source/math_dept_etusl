{% extends 'base.html' %}
{% block title %}New Announcement — ETU Portal{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="etu-card">
            <div class="etu-card-hdr"><span><i class="bi bi-megaphone-fill me-2"></i>New Announcement</span></div>
            <div class="etu-card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" name="title" class="form-control" placeholder="Announcement title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Message</label>
                        <textarea name="body" class="form-control" rows="6" placeholder="Write your announcement here..." required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Audience</label>
                        <select name="target" class="form-select">
                            <option value="all">Everyone</option>
                            <option value="student">Students Only</option>
                            <option value="staff">Staff Only</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn auth-submit"><i class="bi bi-send-fill me-1"></i>Post Announcement</button>
                        <a href="{% url 'announcements' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
