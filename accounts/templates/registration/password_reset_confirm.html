{% extends 'base.html' %}
{% block title %}Set New Password — ETU Portal{% endblock %}
{% block content %}

<div class="row justify-content-center auth-wrap">
    <div class="col-md-6 col-lg-5">
        <div class="etu-card">
            <div class="etu-card-hdr">
                <span><i class="bi bi-key me-2"></i>Create New Password</span>
            </div>
            <div class="etu-card-body">
                {% if validlink %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="id_new_password1">New Password</label>
                        <input type="password" name="new_password1" id="id_new_password1" class="form-control" placeholder="Enter new password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="id_new_password2">Confirm Password</label>
                        <input type="password" name="new_password2" id="id_new_password2" class="form-control" placeholder="Repeat new password" required>
                    </div>
                    <button type="submit" class="btn auth-submit"><i class="bi bi-shield-lock me-1"></i>Update Password</button>
                </form>
                {% else %}
                <div class="text-center py-3">
                    <i class="bi bi-exclamation-triangle display-4 ic-amber d-block mb-3"></i>
                    <p class="mb-3">This password reset link is invalid or has expired.</p>
                    <a href="{% url 'password_reset' %}" class="btn btn-outline-primary btn-sm">Request a new link</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
