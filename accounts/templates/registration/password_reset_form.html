{% extends 'base.html' %}
{% block title %}Reset Password — ETU Portal{% endblock %}
{% block content %}

<div class="row justify-content-center auth-wrap">
    <div class="col-md-6 col-lg-5">
        <div class="etu-card">
            <div class="etu-card-hdr">
                <span><i class="bi bi-shield-lock me-2"></i>Reset Password</span>
            </div>
            <div class="etu-card-body">
                <p class="text-muted small mb-3">Enter your email address and we will send you a password reset link.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="id_email">Email Address</label>
                        <input type="email" name="email" id="id_email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    <button type="submit" class="btn auth-submit"><i class="bi bi-envelope me-1"></i>Send Reset Link</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'login' %}" class="auth-link small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
