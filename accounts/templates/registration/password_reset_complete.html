{% extends 'base.html' %}
{% block title %}Password Updated — ETU Portal{% endblock %}
{% block content %}

<div class="row justify-content-center auth-wrap">
    <div class="col-md-6 col-lg-5">
        <div class="etu-card">
            <div class="etu-card-hdr">
                <span><i class="bi bi-check-circle-fill me-2 ic-green"></i>Password Updated</span>
            </div>
            <div class="etu-card-body text-center">
                <p class="mb-3">Your password has been changed successfully. You can now log in with your new password.</p>
                <a href="{% url 'login' %}" class="btn auth-submit"><i class="bi bi-box-arrow-in-right me-1"></i>Go to Login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
