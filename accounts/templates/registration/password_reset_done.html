{% extends 'base.html' %}
{% block title %}Reset Email Sent — ETU Portal{% endblock %}
{% block content %}

<div class="row justify-content-center auth-wrap">
    <div class="col-md-6 col-lg-5">
        <div class="etu-card">
            <div class="etu-card-hdr">
                <span><i class="bi bi-envelope-check me-2 ic-green"></i>Check Your Email</span>
            </div>
            <div class="etu-card-body text-center">
                <p class="mb-3">If an account exists for that email address, a password reset link has been sent. Check your inbox (and spam folder).</p>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
